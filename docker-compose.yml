version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: fund-manager-db
    environment:
      POSTGRES_USER: fund_admin
      POSTGRES_PASSWORD: secure_password_123
      POSTGRES_DB: fund_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - fund-manager-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fund_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fund-manager-api
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://fund_admin:secure_password_123@postgres:5432/fund_manager
      JWT_SECRET: your-secret-key-change-in-production
      PORT: 5000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - fund-manager-network
    command: npm run dev

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fund-manager-web
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - fund-manager-network
    command: npm start

  # ML Service
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: fund-manager-ml
    ports:
      - "5001:5001"
    environment:
      FLASK_ENV: development
      DATABASE_URL: postgresql://fund_admin:secure_password_123@postgres:5432/fund_manager
    depends_on:
      - postgres
    volumes:
      - ./ml-service:/app
    networks:
      - fund-manager-network
    command: python app.py

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: fund-manager-cache
    ports:
      - "6379:6379"
    networks:
      - fund-manager-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  fund-manager-network:
    driver: bridge
